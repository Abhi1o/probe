[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
probe_instrumentation = "5vn9WdV1trzRCW3zjPauKnMuQy61w11uq9ZgwjDqrLkj"

[programs.mainnet]
probe_instrumentation = "5vn9WdV1trzRCW3zjPauKnMuQy61w11uq9ZgwjDqrLkj"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = [
    "programs/*"
]
